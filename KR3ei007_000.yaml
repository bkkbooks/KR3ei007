body:
  text: 調經門婦科總括男婦兩科同一治所異調經崩帶癥嗣育胎前併産後前陰乳疾不相同天癸月經之原先天天癸始父母後天精血水穀生女子二七天癸至任通沖盛月事行婦人不孕之故不孕之故傷任沖不調帶下經漏崩或因積血胞寒熱痰飲脂膜病子宮月經之常月經三旬時一下兩月並月三居經一年一至為避年一生不至孕暗經月經異常經期吐血或衄血上溢妄行曰逆經受孕行經曰垢胎受孕下血漏胎名外因經病天地溫和經水安寒凝熱沸風蕩然邪入胞中任沖損婦人經病本同參內因經病婦人從人不專主病多憂忿鬱傷情血之行止與順逆皆由一氣率而行不內外因經病血者水穀之精氣若傷脾胃何以生不調液竭血枯病合之非道損傷成血色不正病因血從陽化色正紅色變紫黑熱之徵黃泔淡紅濕虛化更審瘀塊黯與明氣穢清濁病因熱化稠黏臭必穢寒化清徹臭則腥內潰五色有臟氣時下而多命必傾愆期前後多少經來前後為愆期前熱後滯有虛實淡少為虛不脹痛紫多脹痛屬有餘經行發熱時熱經行發熱時潮熱經前血熱經後虛發熱無時察客熱潮熱午後審陰虛經行寒熱身痛經來寒熱身體痛當分榮衛與虛實有汗不脹衛不足無汗而脹榮有餘經行腹痛腹痛經後氣血弱痛在經前氣血凝氣滯腹脹血滯痛更審虛實寒熱情經行瀉吐經行泄瀉是脾虛鴨溏清痛乃寒濕胃弱飲傷多嘔飲食傷必痛吐其食錯經妄行成吐衄崩逆行吐血錯行崩熱傷陰陽絡妄行血多熱去當用補血少雖虛須主清經水過多兼時下白帶多清淺淡虛不攝稠黏深紅熱有餘兼帶時下濕熱穢形清腥穢冷濕虛調經證治補養元氣四君子參苓朮草棗生薑異功加陳兼理氣虛痰橘半六君湯嘔吐香砂六君子渴瀉七味藿葛香脾瀉參苓白朮散薏桔山蓮砂扁方思慮傷脾損心血歸脾歸耆棗遠香減參加柴歸芍薄逍遙調肝理脾方合物八珍兼補血耆桂十全大補湯去參苓朮雙和飲去芎加陳養榮湯脾胃虛寒吐且瀉理中減苓加乾薑附方四君子湯人參白朮土炒茯苓各二錢甘草一錢上銼薑棗水煎服異功散人參白朮土炒茯苓各二錢甘草炙五分陳皮二錢上銼加生薑水煎服六君子湯人參白朮土炒茯苓半夏陳皮各一錢甘草炙五分上銼薑棗水煎服香砂六君子湯即上方加藿香葉砂仁七味白朮散人參白朮土炒茯苓各一錢五分甘草炙五分藿香木香乾葛各一錢上銼水煎服參苓白朮散人參白朮土炒茯苓山藥炒甘草蓮肉去心白扁豆薑汁炒各一錢五分薏苡仁炒砂仁桔梗各八分上為細末每服二錢薑棗湯調服歸脾湯人參黃耆炙白朮土炒茯神當歸龍眼肉遠志去心棗仁炒各一錢木香甘草炙各五分上銼薑棗水煎服原歌括漏龍眼肉逍遙散當歸酒洗白芍酒炒白茯苓柴胡各一錢甘草炙五分白朮土炒一錢上銼散加薄荷水煎服八珍湯人參白朮土炒茯苓甘草熟地當歸川芎白芍各等分加薑棗水煎服十全大補湯人參白朮茯苓黃耆當歸熟地白芍川芎各一錢肉桂甘草炙各五分加薑棗水煎服雙和飲即十全大補湯去人參白朮茯苓人參養榮湯即十全大補湯去川芎加陳皮遠志五味理中湯白朮人參乾薑甘草炙各一錢上銼水煎服婦人血病主四物歸芎白芍熟地黃血瘀改以赤芍藥血熱易用生地黃表熱有汗合桂草表熱無汗合麻黃少陽寒熱小柴並陽明熱合調胃湯附方四物湯熟地二錢川芎一錢白芍炒二錢當歸二錢上為粗末水煎服桂枝四物湯當歸熟地川芎各二錢白芍炒三錢桂枝三錢甘草炒一錢加薑棗水煎服麻黃四物湯當歸熟地白芍川芎各二錢麻黃桂枝各一錢杏仁二十粒甘草一錢加薑棗水煎服柴胡四物湯川芎當歸白芍熟地各一錢五分柴胡人參黃芩各二錢甘草五分半夏二錢制上為末每服五錢水煎服玉燭散當歸川芎熟地白芍各二錢大黃芒硝甘草各一錢上銼每服八錢水煎食前服月經先期證治先期實熱物芩連虛熱地骨皮飲丹血多膠艾熱芩術逐瘀桃紅柴塊黏血少淺淡虛不攝當歸補血歸耆先虛甚參耆聖愈補熱滯姜芩丹附延逐瘀芎歸佛手散又名芎歸效若仙附方芩連四物湯即四物湯加黃芩黃連地骨皮飲當歸生地各二錢白芍一錢川芎八分牡丹皮地骨皮各二錢水煎服膠艾四物湯熟地當歸川芎白芍阿膠蛤粉末炒成珠艾葉各一錢甘草炙五分上銼水酒各半煎空心服芩術四物湯即四物湯加黃芩白朮桃紅四物湯即四物湯加桃仁紅花當歸補血湯當歸三錢黃耆蜜炙一兩水煎服聖愈湯熟地酒拌蒸半日白芍酒拌川芎人參各七錢五分當歸酒洗黃耆炙五錢水煎服姜芩四物湯當歸熟地赤芍川芎薑黃黃芩丹皮延胡索香附制各等分水煎服佛手散芎歸湯川芎二兩當歸三兩上為細末每服二錢水一盞酒二分煎七分溫服月經過期證治過期血滯物桃紅附莪桂草木香通血虛期過無脹熱雙和聖愈及養榮附方過期飲熟地白芍炒當歸香附各二錢川芎一錢紅花七分桃仁泥六分蓬莪朮木通各五分甘草炙肉桂各四分木香八分水煎食前溫服雙和飲聖愈湯人參養榮湯經行發熱證治經來身熱有表發內熱地骨加胡連經後六神加耆骨逍遙理脾而清肝附方加味地骨皮飲生地當歸白芍各二錢川芎八分牡丹皮地骨皮各三錢胡連一錢水煎服六神湯熟地當歸白芍川芎黃耆地骨皮各等分上㕮咀水煎服逍遙散經行身痛證治經來身痛有表發無表四物羌桂枝經後血多黃耆建耆桂芍草棗姜飴附方羌桂四物湯即四物湯加羌活桂枝黃耆建中湯黃耆炙肉桂各一兩白芍炒二兩甘草炙七錢上為末每服五錢加薑棗水煎服日二三服如虛甚者加附子經行腹痛證治經後腹痛當歸建經前脹痛氣為殃加味烏藥湯烏縮延草木香香附